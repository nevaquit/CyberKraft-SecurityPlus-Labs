# ============================================================
# CyberKraft Security+ Lab 03 — Splunk SIEM
# File: inputs.conf
# Location: C:\Program Files\Splunk\etc\system\local\inputs.conf
# Purpose: Configure Windows Event Log data inputs
# Author: Henry Jenkins | CyberKraft Training
# Azure VM: HenryVM (South Africa North)
# ============================================================

# ---- Windows Security Event Log ----
[WinEventLog://Security]
disabled = 0
index = windows
start_from = oldest
current_only = 0
evt_resolve_ad_obj = 1
renderXml = false
# Key Event IDs to monitor:
# 4624 - Successful logon
# 4625 - Failed logon
# 4634 - Logoff
# 4648 - Logon with explicit credentials
# 4720 - User account created
# 4722 - User account enabled
# 4723 - Password change attempt
# 4724 - Password reset
# 4725 - User account disabled
# 4726 - User account deleted
# 4728 - Member added to global group
# 4732 - Member added to local group
# 4740 - Account locked out
# 4756 - Member added to universal group
# 4768 - Kerberos TGT request
# 4769 - Kerberos service ticket request
# 4771 - Kerberos pre-auth failed
# 4776 - NTLM authentication

# ---- Windows System Event Log ----
[WinEventLog://System]
disabled = 0
index = windows
start_from = oldest

# ---- Windows Application Event Log ----
[WinEventLog://Application]
disabled = 0
index = windows
start_from = oldest

# ---- Sysmon Operational Log ----
# Requires Sysmon to be installed: https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
index = sysmon
renderXml = true
start_from = oldest
# Key Sysmon Event IDs:
# 1  - Process creation
# 2  - File creation time changed
# 3  - Network connection
# 5  - Process terminated
# 7  - Image loaded
# 8  - CreateRemoteThread
# 10 - ProcessAccess
# 11 - FileCreate
# 12 - RegistryEvent (object create/delete)
# 13 - RegistryEvent (value set)
# 15 - FileCreateStreamHash
# 17 - PipeEvent (created)
# 22 - DNSEvent

# ---- PowerShell Operational Log ----
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = 0
index = windows
start_from = oldest
# Key Event IDs:
# 4103 - Module logging
# 4104 - Script block logging
# 4105 - Script start
# 4106 - Script stop

# ---- Task Scheduler Log ----
[WinEventLog://Microsoft-Windows-TaskScheduler/Operational]
disabled = 0
index = windows
start_from = oldest
# Key Event IDs:
# 4698 - Scheduled task created
# 4699 - Scheduled task deleted
# 4700 - Scheduled task enabled
# 4701 - Scheduled task disabled

# ---- Windows Defender Log ----
[WinEventLog://Microsoft-Windows-Windows Defender/Operational]
disabled = 0
index = windows
start_from = oldest
# Key Event IDs:
# 1116 - Malware detected
# 1117 - Malware action taken
# 1118 - Malware action failed

# ---- IIS Access Log (if IIS installed) ----
[monitor://C:\inetpub\logs\LogFiles\W3SVC1\*.log]
disabled = 0
index = iis
sourcetype = iis
